version: "2.1"
services:
  calibre-web:
    image: lscr.io/linuxserver/calibre-web:latest
    container_name: calibre-web
    ports:
      - 8083:8083
    environment:
      - PUID=1000
      - PGID=1000
      - UMASK=002
      - TZ=Europe/Stockholm
      - DOCKER_MODS=linuxserver/mods:universal-calibre # Enables ebook conversion
    volumes:
      - ./config:/config
      - /srv/data/media/books:/books
    restart: unless-stopped

networks:
  default:
    name: boulder
